name: LLM Eval
on:
  pull_request:
    paths: ["src/**", "prompts/**", "eval/golden_set.parquet"]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Level-1 unit tests
        run: pytest tests/unit -q

      - name: Level-2 LLM-as-judge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >
          python -m eval.run_judge
          --golden-set eval/golden_set.parquet
          --min-pass-rate 0.80
          --min-kappa-vs-baseline 0.75

      - uses: actions/github-script@v7
        with:
          script: |
            // 把結果貼回 PR comment
            const fs = require('fs');
            const report = fs.readFileSync('eval_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report,
            });
